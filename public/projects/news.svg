<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="newsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#newsBg)"/>
  
  <!-- Decorative elements -->
  <circle cx="140" cy="95" r="55" fill="white" opacity="0.1"/>
  <circle cx="660" cy="355" r="75" fill="white" opacity="0.1"/>
  
  <!-- Newspaper icon -->
  <g transform="translate(400, 200)">
    <!-- Main newspaper -->
    <rect x="-100" y="-70" width="200" height="140" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Headline -->
    <rect x="-85" y="-55" width="170" height="15" rx="2" fill="#DC2626" opacity="0.7"/>
    
    <!-- Text lines -->
    <line x1="-85" y1="-25" x2="85" y2="-25" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
    <line x1="-85" y1="-10" x2="85" y2="-10" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
    <line x1="-85" y1="5" x2="85" y2="5" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
    <line x1="-85" y1="20" x2="60" y2="20" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
    
    <!-- Image placeholder -->
    <rect x="-85" y="35" width="60" height="25" rx="3" fill="#DC2626" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle">News WebApp</text>
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="24" 
        fill="white" text-anchor="middle" opacity="0.9">Real-Time News Updates</text>
</svg>
