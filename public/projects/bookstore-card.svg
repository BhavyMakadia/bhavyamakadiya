<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookstoreCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="16" fill="url(#bookstoreCardBg)" filter="url(#cardShadow)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="95" cy="75" r="90" fill="white" opacity="0.05"/>
  <circle cx="505" cy="325" r="110" fill="white" opacity="0.05"/>
  
  <!-- Main Icon Area -->
  <g transform="translate(300, 160)">
    <!-- Books Icon -->
    <g opacity="0.95">
      <!-- Book 1 (Left) -->
      <rect x="-75" y="-35" width="40" height="90" rx="4" fill="white" transform="rotate(-12 -55 10)"/>
      <line x1="-55" y1="-25" x2="-55" y2="35" stroke="#7C3AED" stroke-width="3"/>
      
      <!-- Book 2 (Center) -->
      <rect x="-20" y="-45" width="40" height="100" rx="4" fill="white"/>
      <line x1="0" y1="-35" x2="0" y2="45" stroke="#7C3AED" stroke-width="3"/>
      
      <!-- Book 3 (Right) -->
      <rect x="35" y="-40" width="40" height="95" rx="4" fill="white" transform="rotate(10 55 7.5)"/>
      <line x1="55" y1="-30" x2="55" y2="40" stroke="#7C3AED" stroke-width="3"/>
    </g>
  </g>
  
  <!-- Title Section -->
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="42" font-weight="bold" 
        fill="white" text-anchor="middle">Book Store</text>
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="26" font-weight="600" 
        fill="white" text-anchor="middle" opacity="0.95">Management</text>
  
  <!-- Tech Stack Indicator -->
  <g transform="translate(300, 360)">
    <circle cx="-20" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="20" cy="0" r="5" fill="white" opacity="0.7"/>
  </g>
</svg>
