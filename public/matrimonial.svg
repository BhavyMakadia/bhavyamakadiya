<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="matrimonialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#matrimonialGradient)"/>
  
  <!-- Hearts -->
  <g transform="translate(200, 120)">
    <!-- Left heart -->
    <path d="M -30 0 C -30 -15, -50 -15, -50 0 C -50 15, -30 30, -10 45 C 10 30, 30 15, 30 0 C 30 -15, 10 -15, 10 0 Z" 
          fill="white" opacity="0.9" transform="translate(-40, 0)"/>
    
    <!-- Right heart -->
    <path d="M -30 0 C -30 -15, -50 -15, -50 0 C -50 15, -30 30, -10 45 C 10 30, 30 15, 30 0 C 30 -15, 10 -15, 10 0 Z" 
          fill="white" opacity="0.9" transform="translate(40, 0)"/>
    
    <!-- Connection line -->
    <line x1="-20" y1="20" x2="20" y2="20" stroke="white" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="white" text-anchor="middle">Matrimonial</text>
  <text x="200" y="255" font-family="Arial, sans-serif" font-size="24" 
        fill="white" text-anchor="middle" opacity="0.9">Platform</text>
</svg>
