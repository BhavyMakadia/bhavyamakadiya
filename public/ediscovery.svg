<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ediscoveryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#ediscoveryGradient)"/>
  
  <!-- Document icon -->
  <g transform="translate(200, 100)">
    <!-- Main document -->
    <rect x="-50" y="-40" width="100" height="120" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Document lines -->
    <line x1="-35" y1="-20" x2="35" y2="-20" stroke="#3B82F6" stroke-width="3" opacity="0.7"/>
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#3B82F6" stroke-width="3" opacity="0.7"/>
    <line x1="-35" y1="20" x2="35" y2="20" stroke="#3B82F6" stroke-width="3" opacity="0.7"/>
    <line x1="-35" y1="40" x2="20" y2="40" stroke="#3B82F6" stroke-width="3" opacity="0.7"/>
    
    <!-- Magnifying glass -->
    <circle cx="30" cy="50" r="20" stroke="white" stroke-width="4" fill="none"/>
    <line x1="45" y1="65" x2="60" y2="80" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="white" text-anchor="middle">E-Discovery</text>
  <text x="200" y="255" font-family="Arial, sans-serif" font-size="22" 
        fill="white" text-anchor="middle" opacity="0.9">Legal System</text>
</svg>
