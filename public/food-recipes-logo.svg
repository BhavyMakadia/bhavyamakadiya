<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="foodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#foodGradient)" filter="url(#shadow)"/>
  
  <!-- Chef hat icon -->
  <g transform="translate(200, 200)">
    <!-- Hat base -->
    <ellipse cx="0" cy="60" rx="80" ry="15" fill="white" opacity="0.95"/>
    
    <!-- Hat body -->
    <path d="M -70 60 Q -70 -20, -40 -50 Q -20 -70, 0 -70 Q 20 -70, 40 -50 Q 70 -20, 70 60 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Hat puff details -->
    <circle cx="-45" cy="-30" r="25" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-50" r="30" fill="white" opacity="0.9"/>
    <circle cx="45" cy="-30" r="25" fill="white" opacity="0.9"/>
    
    <!-- Spoon and fork crossed -->
    <g transform="translate(0, 80)">
      <!-- Fork -->
      <g transform="rotate(-30) translate(-15, 0)">
        <rect x="-3" y="0" width="6" height="50" rx="3" fill="#FF6B35"/>
        <rect x="-8" y="-8" width="4" height="12" rx="2" fill="#FF6B35"/>
        <rect x="-2" y="-8" width="4" height="12" rx="2" fill="#FF6B35"/>
        <rect x="4" y="-8" width="4" height="12" rx="2" fill="#FF6B35"/>
      </g>
      
      <!-- Spoon -->
      <g transform="rotate(30) translate(15, 0)">
        <rect x="-3" y="0" width="6" height="50" rx="3" fill="#F7931E"/>
        <ellipse cx="0" cy="-8" rx="8" ry="10" fill="#F7931E"/>
      </g>
    </g>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="white" text-anchor="middle">Indian Recipes</text>
</svg>
