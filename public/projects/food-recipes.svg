<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="foodBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#foodBg)"/>
  
  <!-- Decorative elements -->
  <circle cx="125" cy="100" r="60" fill="white" opacity="0.1"/>
  <circle cx="675" cy="350" r="80" fill="white" opacity="0.1"/>
  
  <!-- Chef hat and utensils -->
  <g transform="translate(400, 180)">
    <!-- Chef hat -->
    <ellipse cx="0" cy="40" rx="70" ry="12" fill="white" opacity="0.95"/>
    <path d="M -60 40 Q -60 -15, -35 -40 Q -15 -55, 0 -55 Q 15 -55, 35 -40 Q 60 -15, 60 40 Z" 
          fill="white" opacity="0.95"/>
    <circle cx="-40" cy="-25" r="22" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-40" r="25" fill="white" opacity="0.9"/>
    <circle cx="40" cy="-25" r="22" fill="white" opacity="0.9"/>
    
    <!-- Spoon and fork -->
    <g transform="translate(0, 80)">
      <g transform="rotate(-25) translate(-20, 0)">
        <rect x="-2.5" y="0" width="5" height="40" rx="2.5" fill="#F59E0B"/>
        <rect x="-6" y="-6" width="3" height="10" rx="1.5" fill="#F59E0B"/>
        <rect x="-1.5" y="-6" width="3" height="10" rx="1.5" fill="#F59E0B"/>
        <rect x="3" y="-6" width="3" height="10" rx="1.5" fill="#F59E0B"/>
      </g>
      <g transform="rotate(25) translate(20, 0)">
        <rect x="-2.5" y="0" width="5" height="40" rx="2.5" fill="#F59E0B"/>
        <ellipse cx="0" cy="-6" rx="6" ry="8" fill="#F59E0B"/>
      </g>
    </g>
  </g>
  
  <!-- Text -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle">Indian Food Recipes</text>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="24" 
        fill="white" text-anchor="middle" opacity="0.9">Famous Indian Dishes</text>
</svg>
