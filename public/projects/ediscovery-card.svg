<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ediscoveryCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="16" fill="url(#ediscoveryCardBg)" filter="url(#cardShadow)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="100" cy="70" r="90" fill="white" opacity="0.05"/>
  <circle cx="500" cy="330" r="110" fill="white" opacity="0.05"/>
  
  <!-- Main Icon Area -->
  <g transform="translate(300, 140)">
    <!-- Document with Magnifying Glass -->
    <g opacity="0.95">
      <!-- Document -->
      <rect x="-60" y="-50" width="120" height="150" rx="8" fill="white"/>
      <!-- Document Lines -->
      <line x1="-45" y1="-30" x2="45" y2="-30" stroke="#3B82F6" stroke-width="4" opacity="0.6"/>
      <line x1="-45" y1="-5" x2="45" y2="-5" stroke="#3B82F6" stroke-width="4" opacity="0.6"/>
      <line x1="-45" y1="20" x2="45" y2="20" stroke="#3B82F6" stroke-width="4" opacity="0.6"/>
      <line x1="-45" y1="45" x2="30" y2="45" stroke="#3B82F6" stroke-width="4" opacity="0.6"/>
      <!-- Magnifying Glass -->
      <circle cx="40" cy="70" r="25" stroke="white" stroke-width="5" fill="none"/>
      <line x1="58" y1="88" x2="75" y2="105" stroke="white" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Title Section -->
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="40" font-weight="bold" 
        fill="white" text-anchor="middle">E-Discovery</text>
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="26" font-weight="600" 
        fill="white" text-anchor="middle" opacity="0.95">System</text>
  
  <!-- Tech Stack Indicator -->
  <g transform="translate(300, 365)">
    <circle cx="-40" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="-20" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="20" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="40" cy="0" r="5" fill="white" opacity="0.7"/>
  </g>
</svg>
