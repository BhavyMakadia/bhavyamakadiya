<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="foodCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="16" fill="url(#foodCardBg)" filter="url(#cardShadow)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="90" cy="75" r="90" fill="white" opacity="0.08"/>
  <circle cx="510" cy="325" r="110" fill="white" opacity="0.08"/>
  
  <!-- Main Icon Area -->
  <g transform="translate(300, 140)">
    <!-- Chef Hat and Utensils -->
    <g opacity="0.95">
      <!-- Chef Hat -->
      <ellipse cx="0" cy="30" rx="60" ry="10" fill="white"/>
      <path d="M -50 30 Q -50 -10, -30 -32 Q -12 -45, 0 -45 Q 12 -45, 30 -32 Q 50 -10, 50 30 Z" 
            fill="white"/>
      <circle cx="-35" cy="-20" r="18" fill="white" opacity="0.95"/>
      <circle cx="0" cy="-32" r="20" fill="white" opacity="0.95"/>
      <circle cx="35" cy="-20" r="18" fill="white" opacity="0.95"/>
      
      <!-- Spoon and Fork -->
      <g transform="translate(0, 70)">
        <!-- Fork (Left) -->
        <g transform="rotate(-22) translate(-18, 0)">
          <rect x="-2" y="0" width="4" height="35" rx="2" fill="white"/>
          <rect x="-5" y="-5" width="2.5" height="8" rx="1.2" fill="white"/>
          <rect x="-1.2" y="-5" width="2.5" height="8" rx="1.2" fill="white"/>
          <rect x="2.5" y="-5" width="2.5" height="8" rx="1.2" fill="white"/>
        </g>
        
        <!-- Spoon (Right) -->
        <g transform="rotate(22) translate(18, 0)">
          <rect x="-2" y="0" width="4" height="35" rx="2" fill="white"/>
          <ellipse cx="0" cy="-5" rx="5" ry="7" fill="white"/>
        </g>
      </g>
    </g>
  </g>
  
  <!-- Title Section -->
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="38" font-weight="bold" 
        fill="white" text-anchor="middle">Indian Food</text>
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="26" font-weight="600" 
        fill="white" text-anchor="middle" opacity="0.95">Recipes</text>
  
  <!-- Tech Stack Indicator -->
  <g transform="translate(300, 360)">
    <circle cx="-30" cy="0" r="5" fill="white" opacity="0.8"/>
    <circle cx="-10" cy="0" r="5" fill="white" opacity="0.8"/>
    <circle cx="10" cy="0" r="5" fill="white" opacity="0.8"/>
    <circle cx="30" cy="0" r="5" fill="white" opacity="0.8"/>
  </g>
</svg>
