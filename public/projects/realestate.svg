<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="realestateBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#realestateBg)"/>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="90" r="55" fill="white" opacity="0.1"/>
  <circle cx="680" cy="360" r="75" fill="white" opacity="0.1"/>
  
  <!-- House icon -->
  <g transform="translate(400, 200)">
    <!-- Roof -->
    <path d="M -100 0 L 0 -80 L 100 0 Z" fill="white" opacity="0.95"/>
    <!-- House body -->
    <rect x="-80" y="0" width="160" height="120" fill="white" opacity="0.95"/>
    <!-- Door -->
    <rect x="-25" y="50" width="50" height="70" fill="#059669" opacity="0.8"/>
    <!-- Windows -->
    <rect x="-65" y="30" width="30" height="30" fill="#059669" opacity="0.8"/>
    <rect x="35" y="30" width="30" height="30" fill="#059669" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle">Real Estate Platform</text>
  <text x="400" y="405" font-family="Arial, sans-serif" font-size="24" 
        fill="white" text-anchor="middle" opacity="0.9">Property Listings & Management</text>
</svg>
