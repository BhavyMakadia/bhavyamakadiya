<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="matrimonialCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C026D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="16" fill="url(#matrimonialCardBg)" filter="url(#cardShadow)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="80" cy="80" r="100" fill="white" opacity="0.05"/>
  <circle cx="520" cy="320" r="120" fill="white" opacity="0.05"/>
  
  <!-- Main Icon Area -->
  <g transform="translate(300, 150)">
    <!-- Hearts Icon -->
    <g opacity="0.95">
      <!-- Left Heart -->
      <path d="M -50 -10 C -50 -30, -75 -30, -75 -10 C -75 10, -50 30, -25 50 C 0 30, 25 10, 25 -10 C 25 -30, 0 -30, 0 -10 Z" 
            fill="white" transform="translate(-40, 0)"/>
      <!-- Right Heart -->
      <path d="M -50 -10 C -50 -30, -75 -30, -75 -10 C -75 10, -50 30, -25 50 C 0 30, 25 10, 25 -10 C 25 -30, 0 -30, 0 -10 Z" 
            fill="white" transform="translate(40, 0)"/>
      <!-- Connection -->
      <circle cx="0" cy="20" r="8" fill="white"/>
    </g>
  </g>
  
  <!-- Project Badge -->
  <rect x="30" y="30" width="140" height="32" rx="16" fill="white" opacity="0.2"/>
  <text x="100" y="52" font-family="Arial, sans-serif" font-size="16" font-weight="600" 
        fill="white" text-anchor="middle">FEATURED</text>
  
  <!-- Title Section -->
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="42" font-weight="bold" 
        fill="white" text-anchor="middle">Matrimonial</text>
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="600" 
        fill="white" text-anchor="middle" opacity="0.95">Website</text>
  
  <!-- Tech Stack Indicator -->
  <g transform="translate(300, 360)">
    <circle cx="-60" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="-40" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="-20" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="20" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="40" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="60" cy="0" r="6" fill="white" opacity="0.7"/>
  </g>
</svg>
