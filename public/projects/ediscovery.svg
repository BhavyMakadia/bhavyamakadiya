<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ediscoveryBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#ediscoveryBg)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="80" r="50" fill="white" opacity="0.1"/>
  <circle cx="650" cy="370" r="70" fill="white" opacity="0.1"/>
  
  <!-- Document icon -->
  <g transform="translate(400, 180)">
    <rect x="-80" y="-70" width="160" height="200" rx="12" fill="white" opacity="0.95"/>
    <line x1="-55" y1="-40" x2="55" y2="-40" stroke="#3B82F6" stroke-width="5" opacity="0.7"/>
    <line x1="-55" y1="-10" x2="55" y2="-10" stroke="#3B82F6" stroke-width="5" opacity="0.7"/>
    <line x1="-55" y1="20" x2="55" y2="20" stroke="#3B82F6" stroke-width="5" opacity="0.7"/>
    <line x1="-55" y1="50" x2="30" y2="50" stroke="#3B82F6" stroke-width="5" opacity="0.7"/>
    
    <!-- Magnifying glass -->
    <circle cx="50" cy="80" r="30" stroke="white" stroke-width="6" fill="none"/>
    <line x1="70" y1="100" x2="95" y2="125" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle">E-Discovery System</text>
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="24" 
        fill="white" text-anchor="middle" opacity="0.9">Legal Document Management</text>
</svg>
