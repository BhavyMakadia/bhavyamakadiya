<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="newsCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="16" fill="url(#newsCardBg)" filter="url(#cardShadow)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="100" cy="80" r="95" fill="white" opacity="0.05"/>
  <circle cx="500" cy="320" r="115" fill="white" opacity="0.05"/>
  
  <!-- Main Icon Area -->
  <g transform="translate(300, 155)">
    <!-- Newspaper Icon -->
    <g opacity="0.95">
      <!-- Main Paper -->
      <rect x="-75" y="-50" width="150" height="110" rx="6" fill="white"/>
      
      <!-- Headline -->
      <rect x="-65" y="-40" width="130" height="12" rx="2" fill="#DC2626" opacity="0.7"/>
      
      <!-- Text Lines -->
      <line x1="-65" y1="-18" x2="65" y2="-18" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
      <line x1="-65" y1="-6" x2="65" y2="-6" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
      <line x1="-65" y1="6" x2="65" y2="6" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
      <line x1="-65" y1="18" x2="45" y2="18" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
      
      <!-- Image Placeholder -->
      <rect x="-65" y="30" width="50" height="20" rx="3" fill="#DC2626" opacity="0.3"/>
      
      <!-- Column Lines -->
      <line x1="-5" y1="30" x2="-5" y2="50" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
      <line x1="5" y1="30" x2="5" y2="50" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Title Section -->
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="42" font-weight="bold" 
        fill="white" text-anchor="middle">News WebApp</text>
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="26" font-weight="600" 
        fill="white" text-anchor="middle" opacity="0.95">Real-Time Updates</text>
  
  <!-- Tech Stack Indicator -->
  <g transform="translate(300, 360)">
    <circle cx="-20" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity="0.7"/>
    <circle cx="20" cy="0" r="5" fill="white" opacity="0.7"/>
  </g>
</svg>
