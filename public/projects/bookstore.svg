<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookstoreBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bookstoreBg)"/>
  
  <!-- Decorative elements -->
  <circle cx="130" cy="85" r="50" fill="white" opacity="0.1"/>
  <circle cx="670" cy="365" r="70" fill="white" opacity="0.1"/>
  
  <!-- Books icon -->
  <g transform="translate(400, 200)">
    <!-- Book 1 -->
    <rect x="-90" y="-40" width="50" height="100" rx="4" fill="white" opacity="0.95" transform="rotate(-10 -65 10)"/>
    <!-- Book 2 -->
    <rect x="-25" y="-50" width="50" height="110" rx="4" fill="white" opacity="0.95"/>
    <!-- Book 3 -->
    <rect x="40" y="-45" width="50" height="105" rx="4" fill="white" opacity="0.95" transform="rotate(8 65 7.5)"/>
    
    <!-- Book details -->
    <line x1="-20" y1="-30" x2="-20" y2="40" stroke="#7C3AED" stroke-width="3"/>
    <line x1="45" y1="-25" x2="45" y2="40" stroke="#7C3AED" stroke-width="3"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle">Book Store</text>
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="24" 
        fill="white" text-anchor="middle" opacity="0.9">Book & Author Management</text>
</svg>
